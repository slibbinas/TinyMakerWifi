; TinyMaker MSLA firmware – PlatformIO konfigūracija
; Pagal gamintojo aplinką: Arduino IDE 1.8.19 era -> ESP32 Arduino core 2.x
; Plokštė: ESP32-WROOM-32E-N4 (4 MB flash, be PSRAM), USB-UART: CH340
 
[env:tinymaker]
platform = espressif32@6.5.0        ; Arduino core 2.0.14 – NEKELTI i 3.x (Arduino_GFX 1.2.0 nesuderinama)
board = esp32dev                    ; WROOM-32E-N4 = 4MB, atitinka esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600               ; jei CH340 upload nestabilus – sumazinti iki 460800

; GOOGLE Svarbiausi nustatymai "Puya" atminčiai ir V3 lustui
;board_build.flash_mode = dio
;board_build.f_flash = 40000000L
;board_build.f_cpu = 240000000L
;google
 
; Particijos: WiFi + WebServer + unzipLIB app'a padidina, todel min_spiffs
; (1.9 MB app + OTA). Jei nebetilptu – huge_app.csv (3 MB, be OTA).
board_build.partitions = min_spiffs.csv
 
; SVARBU: keturios gamintojo verifikuotos bibliotekos dedamos i lib/ kataloga
; ispakuotos is Firmware/Libraries/*.zip – JU NEIMTI is registro:
;   lib/AccelStepper/   (1.64)
;   lib/Arduino_GFX/    (1.2.0)
;   lib/PNGdec/         (1.0.1)
;   lib/SdFat/          (1.1.2)
; Zemiau tik naujos tinklo funkciju bibliotekos:
lib_deps =
    https://github.com/tzapu/WiFiManager.git#v2.0.17
    bitbank2/unzipLIB@^1.0.0
    knolleary/PubSubClient@^2.8
 
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -DFIRMWARE_VERSION=\"0.8.4\"

; Po kiekvieno USB buildo sulipdo bootloader+partitions+app i firmware-full.bin
; (žr. scripts/post_merge_bin.py) - failas skirtas pirmam flash'inimui per USB.
extra_scripts = post:scripts/post_merge_bin.py

;upload_speed = 115200                      ; Upload Speed: 115200
upload_port = COM5                         ; uncomment and set your port if auto-detect fail
;monitor_port = COM5                        ; uncomment and set your port if auto-detect fail
;monitor_speed = 115200                     ; pakeisk į savo Serial.begin() greitį

; ===================================================================
; OTA env kurejui: flash'inimas oru per WiFi (be USB kabelio).
; VS Code apacios juostoje pasirink env:tinymaker-ota -> Upload.
; Jei tinymaker.local nerandamas (Windows mDNS) - irasyk spausdintuvo IP.
; ===================================================================
[env:tinymaker-ota]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
lib_deps =
    https://github.com/tzapu/WiFiManager.git#v2.0.17
    bitbank2/unzipLIB@^1.0.0
    knolleary/PubSubClient@^2.8
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -DFIRMWARE_VERSION=\"0.8.4\"
upload_protocol = espota
upload_port = tinymaker.local

[platformio]                               ; Kad nesipjautų su Gdrive
build_dir = C:/PIO-build/TinyMakerWiFi
